# M.A.S.H. IoT Configuration
# Temperature thresholds, automation rules, actuator mappings

# Device Identification (from Backend Registration)
# Note: firmware_version is auto-injected from app.core.version at runtime
# id: Neon DB UUID (used for backend API authentication)
# serial_number: Human-readable ID (used for Firebase paths and UI)
device:
  id: "cmkg7pxhn0000bu9kqdlmb4f1"
  name: "Mika's Device"
  serial_number: "MASH-B2-CAL26-CE637C"
  type: "MUSHROOM_CHAMBER"
  location: "Mushroom Cultivation Facility"
  # firmware_version: Auto-injected from version.py (do not set manually)

# System Configuration
system:
  ml_enabled: true
  auto_mode: false
  data_sync_interval: 300  # seconds (5 minutes - reduced to avoid backend strain)
  sensor_read_interval: 5  # seconds

# Passive Fan Configuration (Timed Intervals)
passive_fans:
  spawning_exhaust:
    enabled: false  # Disabled for now while spawning fan control is unavailable
    interval_minutes: 30  # Run every 30 minutes
    duration_seconds: 120  # Run for 2 minutes
    flush_mode:  # Override passive when sensor threshold exceeded
      enabled: true
      co2_trigger: 2000  # Trigger flush when CO2 > 2000 ppm
      duration_seconds: 300  # Flush for 5 minutes
  
  device_exhaust:
    enabled: false  # Disabled for now while device fan control is unavailable
    mode: "clock"  # Options: "interval" or "clock"
    # Clock-based schedule (runs at specific times)
    schedule:
      - "08:00"  # 8 AM
      - "12:00"  # 12 PM
      - "16:00"  # 4 PM
      - "20:00"  # 8 PM
    duration_seconds: 180  # Run for 3 minutes each time

# Fruiting Room Configuration
fruiting_room:
  # Environmental Targets
  temp_target: 24.0  # °C
  temp_min: 22.0
  temp_max: 26.0
  temp_tolerance: 2.0  # Alert if deviation exceeds this
  humidity_target: 90.0  # %
  humidity_min: 85.0
  humidity_max: 95.0
  humidity_hysteresis: 5.0  # Prevent rapid on/off cycling
  humidity_tolerance: 10.0  # Alert threshold
  co2_max: 1000  # ppm
  co2_hysteresis: 100  # Hysteresis to prevent rapid fan cycling
  
  # Actuator Control Thresholds
  exhaust_fan:
    co2_trigger: 1000  # Turn on when CO2 exceeds this
    temp_trigger: 26.0  # Turn on when temp exceeds this
  
  blower_fan:
    always_on: false
    humidity_trigger: 95.0  # Turn on for air circulation
  
  humidifier:
    humidity_trigger: 85.0  # Turn on when below this
    run_duration: 120  # seconds
    cooldown: 300  # seconds between runs
  
  humidifier_fan:
    linked_to_humidifier: true  # Runs when humidifier is on
  
  led:
    enabled: true
    start_time: "08:00"
    end_time: "20:00"
    duration_hours: 12

# Spawning Room Configuration (Sensor only, no actuators in current setup)
# NOTE: Pleurotus florida mycelium is CO2-tolerant during spawn run.
# Research shows 10,000-20,000 ppm CO2 promotes vigorous mycelial expansion
# (Influence of CO2 Concentration on Mycelium Growth, MPG.PuRe).
# Exhaust fan is suppressed to allow metabolic CO2 to accumulate intentionally.
spawning_room:
  temp_target: 28.0  # °C - optimal mycelial growth range: 25-30°C
  temp_min: 25.0
  temp_max: 30.0
  temp_tolerance: 2.0  # Alert if deviation exceeds this
  humidity_target: 75.0  # %  - moderate humidity to prevent anaerobic zones
  humidity_min: 70.0
  humidity_max: 80.0
  humidity_hysteresis: 5.0  # Prevent rapid on/off cycling
  humidity_tolerance: 10.0  # Alert threshold
  co2_max: 20000  # ppm - spawn run optimal is 10,000-20,000 ppm; alert above max
  co2_hysteresis: 2000  # Proportional hysteresis for high CO2 range
  
  exhaust_fan:
    co2_trigger: 20000  # Only trigger if CO2 exceeds biological optimum ceiling
    temp_trigger: 30.0  # Trigger cooling if temp exceeds mycelial tolerance

# Arduino Actuator Mappings (matches config.h)
actuators:
  fruiting:
    - name: "FRUITING_EXHAUST_FAN"
      type: "exhaust_fan"
      pin: 3
    - name: "FRUITING_BLOWER_FAN"
      type: "blower_fan"
      pin: 4
    - name: "HUMIDIFIER_FAN"
      type: "humidifier_fan"
      pin: 5
    - name: "HUMIDIFIER"
      type: "humidifier"
      pin: 6
    - name: "FRUITING_LED"
      type: "led"
      pin: 7
  
  spawning:
    - name: "SPAWNING_EXHAUST_FAN"
      type: "exhaust_fan"
      pin: 2

# Alert Thresholds
alerts:
  critical_co2: 1500  # ppm (fruiting room; CO2 far above 1000 target)
  critical_temp_high: 30.0  # °C
  critical_temp_low: 18.0  # °C
  critical_humidity_low: 70.0  # %
  critical_humidity_high: 97.0  # % (excess condensation risk)
  
# Database Configuration
database:
  path: "data/sensor_data.db"
  retention_days: 30  # Keep data for 30 days locally

# ML Model Configuration
ml_models:
  anomaly_detection:
    enabled: true
    model_path: "data/models/isolation_forest.pkl"
    retrain_interval: 604800  # 7 days in seconds
    contamination: 0.05  # Expected ~5% sensor fault rate in field conditions
    n_estimators: 100
  
  decision_tree:
    enabled: true
    model_path: "data/models/decision_tree.pkl"
    features: ["temp", "humidity", "co2", "hour_of_day"]
    outputs: ["exhaust_fan", "mist_maker", "led"]
    training_samples: 2500
    max_depth: 6
    min_samples_split: 10
    min_samples_leaf: 5
    # Uses MultiOutputClassifier wrapping DecisionTreeClassifier per MASH research
